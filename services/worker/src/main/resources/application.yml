spring:
  application:
    name: worker

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:control_plane}
    username: ${DB_USERNAME:controlplane}
    password: ${DB_PASSWORD:change-me}

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    dev.jwalker.controlplane: ${APP_LOG_LEVEL:INFO}

app:
  api-base-url: ${API_BASE_URL:http://localhost:8080}

worker:
  id: ${WORKER_ID:worker-local-1}
  poll-interval-ms: ${WORKER_POLL_INTERVAL_MS:5000}
  lease-seconds: ${WORKER_LEASE_SECONDS:30}
